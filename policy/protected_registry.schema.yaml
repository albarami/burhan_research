# Burhān — protected registry schema (docs/07_policy/protected_registry.schema.yaml)
# JSON Schema draft 2020-12 in YAML. The registry enumerates decisions the
# system is architecturally forbidden to take (Concept §10.2, FR-1202).
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "burhan:schemas/protected_registry/v1"
title: ProtectedDecisionsRegistry
type: object
additionalProperties: false
required: [schema_version, meta, protected_decisions]
properties:
  schema_version: { const: 1 }

  meta:
    type: object
    additionalProperties: false
    required: [version, owner, status]
    properties:
      version: { type: string, pattern: "^[0-9]+\\.[0-9]+$" }
      owner:   { type: string }
      status:  { enum: [draft, approved] }
      notes:   { type: string }

  protected_decisions:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, title, description, enforcement, system_response, delegable]
      properties:
        id:    { type: string, pattern: "^PD-[0-9]{2}$" }
        title: { type: string }
        description: { type: string }
        enforcement:
          enum: [no_code_path, recommend_only]
          # no_code_path: the engine contains no execution path for this change
          # recommend_only: the engine may DETECT and RECOMMEND, never execute
        system_response:
          enum: [method_advisory, recommendation, hard_refusal]
          # what the system does when evidence points at this decision
        delegable: { type: boolean }
        delegation_ref: { type: string }   # policy rule path enabling delegation (only if delegable)
        concept_ref: { type: string }
        requirement_refs: { type: array, items: { type: string } }
      allOf:
        - if: { properties: { delegable: { const: true } } }
          then: { required: [delegation_ref] }
        - if: { properties: { delegable: { const: false } } }
          then: { not: { required: [delegation_ref] } }

# Loader cross-checks beyond JSON Schema:
#   R1  ids unique; meta.status == approved required for production runs
#   R2  every delegation_ref resolves to a leaf path in decision_policy.yaml
#   R3  registry hash recorded in every run manifest (protected_registry)
