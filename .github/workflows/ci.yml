name: ci
on:
  push: { branches: ["main", "tc/**"] }
  pull_request:
jobs:
  governed-documents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install jsonschema pyyaml pytest ruff
      - name: studies exclusion guard (FR-1402)
        run: |
          test ! -d studies || { echo "studies/ must never be committed"; exit 1; }
      - name: lint
        run: ruff check .
      - name: governed document validation
        run: pytest tests/unit/test_governed_documents.py -q

  # Permanent regression gate (FR-1504): the full battery including the
  # golden certification suite (tests/golden/) and dual-path R parity.
  certification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: sync locked environment
        run: uv sync --frozen
      - uses: r-lib/actions/setup-r@v2
        with: { r-version: "4.5.2", use-public-rspm: true }
      - name: system libraries for the governed R stack
        # mirrors the researcher workstation (E-R3): MVN/car closures load
        # GSL, curl, and nlopt shared libraries at runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev libgsl-dev libnlopt-dev cmake
      - name: restore renv-locked R packages
        working-directory: workers/r
        run: |
          Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"
          Rscript -e "renv::restore(prompt = FALSE)"
          Rscript -e "status <- renv::status(); stopifnot(isTRUE(status[['synchronized']]))"
      - name: expose the renv project library to worker sessions
        # Worker harness sessions start outside workers/r (no .Rprofile
        # activation), so the locked project library must be on R_LIBS for
        # jsonlite 2.0.0 to resolve exactly as renv.lock pins it.
        working-directory: workers/r
        run: |
          echo "R_LIBS=$(Rscript -e 'cat(renv::paths[["library"]]())')" >> "$GITHUB_ENV"
      - name: ruff
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .
      - name: mypy strict
        run: uv run mypy src/
      - name: pytest with coverage (unit + golden certification)
        run: uv run pytest --cov=src --cov-report=term
      - name: lintr (R workers)
        run: |
          Rscript -e "install.packages('lintr', repos = 'https://cloud.r-project.org')"
          Rscript -e "lints <- unlist(lapply(list.files('workers/r', pattern = '[.]R$', full.names = TRUE), lintr::lint)); print(lints); quit(status = as.integer(length(lints) > 0))"
