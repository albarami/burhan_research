# Burhān — CB-SEM Playbook v1.0 (docs/06_playbooks/CB_SEM_PLAYBOOK_v1.0.yaml)
# The method owner's adopted positions, codified. Validates against
# playbook.schema.yaml. Operational numbers live in decision_policy.yaml and
# are referenced via policy_ref (see PLAYBOOK_SCHEMA.md for the split).
schema_version: 1

meta:
  id: CB_SEM_PLAYBOOK
  version: "1.0"
  methodology: CB_SEM
  adopted_by: >
    Researcher-approved positions within the accepted CB-SEM literature
    (Anderson–Gerbing two-step tradition); supervisor-approved where the
    study context requires it (Concept §4).
  status: draft            # -> approved at sign-off; production requires approved (P5)
  approval_note: ""
  changelog:
    - "1.0 — initial Phase 1 playbook."
    - "1.0 — PB-01: Monte Carlo population parameterization added (researcher change, pre-approval draft)."

reporting:
  standards: ["APA 7", "APA JARS-Quant"]
  chapter_structure:
    - "Sample profile and response summary"
    - "Data screening and N reconciliation"
    - "Descriptive statistics and assumption diagnostics"
    - "Measurement model validation (including higher-order structure)"
    - "Common method bias assessment"
    - "Structural model fit and path results"
    - "Hypothesis testing results"
    - "Mediation decomposition"
    - "Summary of findings"
  table_set:
    - "Sample characteristics"
    - "N reconciliation chain"
    - "Descriptives, skewness and kurtosis"
    - "Reliability and convergent validity (alpha, CR, AVE) — both levels for higher-order"
    - "Standardized loadings with significance — first- and second-order"
    - "Fornell–Larcker matrix"
    - "HTMT matrix"
    - "Model fit indices (baseline and adjusted, if respecified)"
    - "Structural paths with bootstrapped CIs and R-squared"
    - "Direct, indirect, and total effects with classification"
    - "Hypothesis testing matrix"
    - "Item-deletion audit (when applicable)"

steps:
  - id: PB-01
    stage: power
    title: "A priori power and sampling adequacy"
    purpose: "Establish that the design can detect meaningful misfit and effects before any estimation."
    method: >
      RMSEA-based power for the test of close fit (H0 e=.05 vs Ha e=.08) at the
      model's df and available N; N:q ratio against the hypothesized free
      parameters; Monte Carlo power simulation (simsem) for the hypothesized
      model under playbook-consistent population values.
    criteria:
      - name: close_fit_power
        rule: "Power for close-fit test >= 0.80"
        value: 0.80
        citation_keys: [maccallum1996]
      - name: n_to_q_target
        rule: "N:q >= 10:1 target; 5:1 absolute floor (flag below target, advisory below floor)"
        value: "10:1 / 5:1"
        citation_keys: [kline2016, bentler_chou1987]
      - name: montecarlo_power
        rule: "Simulated power >= 0.80 for focal structural paths"
        value: 0.80
        policy_ref: power.montecarlo
        citation_keys: [muthen2002]
      - name: montecarlo_population
        rule: >-
          Population model for Monte Carlo power: all standardized
          first- and second-order loadings = 0.70; every hypothesized
          structural path = 0.30 (medium effect); exogenous construct
          correlations = 0.30; residual variances implied by
          standardization. Applies unless a study config overrides
          with cited values.
        value: "loadings .70 / paths .30 / corr .30"
        citation_keys: [muthen2002, cohen1988]
    outputs: ["power.close_fit", "power.n_to_q", "power.montecarlo"]
    failure_action: advisory
    citations: [maccallum1996, kline2016, bentler_chou1987, muthen2002]

  - id: PB-02
    stage: prep
    title: "Response screening and partial-response recovery"
    purpose: "Assemble the analytical sample from real respondents only, with every count accounted for."
    method: >
      Sequence: consent filter -> duplicate detection -> attention-check
      filter -> straight-liner detection -> completion profiling with
      recovery of cases at/above the inclusion threshold -> N reconciliation
      chain emitted with exact sums. Operational values from policy.
    criteria:
      - name: inclusion_threshold
        rule: "Recover partial responses with completion >= policy threshold on model items"
        policy_ref: prep.inclusion_threshold
        citation_keys: [newman2014]
      - name: no_fabrication
        rule: "No synthetic cases; no mean substitution as default (prohibited code paths)"
        citation_keys: [enders2010]
      - name: n_chain_exact
        rule: "Reconciliation chain sums exactly from raw to final analytical N"
        citation_keys: [jars2018]
    outputs: ["prep.n_chain", "prep.screening"]
    failure_action: halt
    citations: [newman2014, enders2010, jars2018]

  - id: PB-03
    stage: prep
    title: "Missingness mechanism and treatment"
    purpose: "Choose a defensible missing-data treatment from evidence, not habit."
    method: >
      Little's MCAR test plus missingness pattern map; FIML as primary
      treatment under MCAR/MAR; multiple imputation with Rubin's-rules pooling
      as the policy-selectable alternative; MNAR indications flagged with
      sensitivity note.
    criteria:
      - name: mechanism_tested
        rule: "Little's MCAR computed and reported before treatment selection"
        citation_keys: [little1988]
      - name: primary_treatment
        rule: "FIML primary; MI alternative per policy; treatment logged with rationale"
        policy_ref: prep.missing_treatment
        citation_keys: [enders2010, rubin1987]
    outputs: ["prep.missingness"]
    failure_action: flag
    citations: [little1988, enders2010, rubin1987]

  - id: PB-04
    stage: prep
    title: "Outlier assessment"
    purpose: "Identify and treat univariate and multivariate outliers under declared rules."
    method: >
      Univariate standardized-score screen and multivariate Mahalanobis D2 at
      policy-set criteria; treatment per policy with sensitivity comparison
      when cases are removed.
    criteria:
      - name: univariate_rule
        rule: "|z| beyond policy criterion flagged/treated per policy"
        policy_ref: prep.outliers.univariate_z
        citation_keys: [tabachnick2019]
      - name: multivariate_rule
        rule: "Mahalanobis D2 at policy p-criterion; treatment logged; sensitivity reported if removed"
        policy_ref: prep.outliers.mahalanobis_p
        citation_keys: [tabachnick2019]
    outputs: ["prep.outliers"]
    failure_action: flag
    citations: [tabachnick2019]

  - id: PB-05
    stage: assumptions
    title: "Distributional diagnostics"
    purpose: "Characterize univariate and multivariate normality to inform estimation."
    method: "Univariate skewness/kurtosis per item; Mardia's multivariate skewness and kurtosis; visual checks archived."
    criteria:
      - name: univariate_bands
        rule: "|skewness| < 2 and |kurtosis| < 7 treated as acceptable for ML-family estimation"
        value: "2 / 7"
        citation_keys: [curran1996, finney2013]
      - name: multivariate_test
        rule: "Mardia's coefficients computed and reported"
        citation_keys: [mardia1970]
    outputs: ["assumptions.normality"]
    failure_action: report
    citations: [curran1996, finney2013, mardia1970]

  - id: PB-06
    stage: assumptions
    title: "Collinearity diagnostics"
    purpose: "Verify predictors are within acceptable collinearity limits."
    method: "VIF and tolerance across model constructs' composites."
    criteria:
      - name: vif_ceiling
        rule: "VIF < 3.0 acceptable; 3.0–5.0 flagged; > 5.0 advisory"
        value: 3.0
        citation_keys: [hair2019]
    outputs: ["assumptions.collinearity"]
    failure_action: flag
    citations: [hair2019]

  - id: PB-07
    stage: assumptions
    title: "Estimator determination (ordinal governance)"
    purpose: "Select the estimator from evidence; ordinal items are never assumed continuous."
    method: >
      Likert indicators may be treated as continuous only when response
      categories >= 5 AND PB-05 univariate bands hold; robust ML (MLR with
      Satorra–Bentler corrections) when multivariate normality is violated;
      WLSMV on polychoric correlations when categories < 5 or severe
      non-normality per policy conditions. Determination and rationale logged
      every run (FR-603).
    criteria:
      - name: continuous_conditions
        rule: "Categories >= 5 AND |skew| < 2 AND |kurtosis| < 7 required for ML-as-continuous"
        value: ">=5 / 2 / 7"
        citation_keys: [rhemtulla2012, curran1996]
      - name: robust_adjustment
        rule: "ML -> MLR under Mardia violation (within-method, autonomous)"
        policy_ref: estimator.robust_trigger
        citation_keys: [satorra_bentler2001]
      - name: categorical_path
        rule: "WLSMV/polychoric when policy conditions met"
        policy_ref: estimator.wlsmv_conditions
        citation_keys: [rhemtulla2012, finney2013]
    outputs: ["assumptions.estimator"]
    failure_action: report
    citations: [rhemtulla2012, curran1996, satorra_bentler2001, finney2013]

  - id: PB-08
    stage: measurement
    title: "CFA specification including higher-order structure"
    purpose: "Estimate the designed measurement model, both levels where second-order constructs exist."
    method: >
      CFA on the DESIGNED item pools from the contract; second-order
      constructs specified per the contract's higher_order approach
      (repeated_indicator or two_stage); identification checks; two-indicator
      first-order factors permitted with flag and constraint note.
    criteria:
      - name: identification
        rule: "Model identified; two-indicator factors flagged as identification-sensitive"
        citation_keys: [kline2016]
      - name: higher_order_reporting
        rule: "Loadings and reliability/validity evidence reported at BOTH levels (FR-702)"
        citation_keys: [credé_harms2015, hair2019]
    outputs: ["measurement.spec", "measurement.loadings"]
    failure_action: halt
    citations: [kline2016, credé_harms2015, hair2019]

  - id: PB-09
    stage: measurement
    title: "Indicator loading assessment"
    purpose: "Evaluate indicator quality against the adopted target."
    method: "Standardized loadings with significance; cross-loading inspection; standardized residual covariance inspection."
    criteria:
      - name: loading_target
        rule: ">= 0.708 target (AVE logic); 0.70–0.708 borderline-acceptable when construct AVE and CR hold; < 0.70 is a deletion-candidate signal (PB-13)"
        value: 0.708
        on_borderline: "retain with flag when AVE >= 0.50 and CR >= 0.70"
        citation_keys: [hair2019, fornell_larcker1981]
      - name: loading_significance
        rule: "All retained loadings significant at p < .05"
        citation_keys: [anderson_gerbing1988]
    outputs: ["measurement.loadings"]
    failure_action: recommend
    citations: [hair2019, fornell_larcker1981, anderson_gerbing1988]

  - id: PB-10
    stage: measurement
    title: "Reliability and convergent validity"
    purpose: "Establish internal consistency and convergent validity per construct."
    method: "Cronbach's alpha, composite reliability, AVE per construct (both levels for higher-order)."
    criteria:
      - name: alpha_floor
        rule: "alpha > 0.70"
        value: 0.70
        citation_keys: [nunnally1994]
      - name: cr_floor
        rule: "CR > 0.70"
        value: 0.70
        citation_keys: [hair2019]
      - name: ave_floor
        rule: "AVE > 0.50"
        value: 0.50
        citation_keys: [fornell_larcker1981]
    outputs: ["measurement.reliability", "measurement.convergent"]
    failure_action: recommend
    citations: [nunnally1994, hair2019, fornell_larcker1981]

  - id: PB-11
    stage: measurement
    title: "Discriminant validity"
    purpose: "Demonstrate constructs are empirically distinct — by both adopted criteria."
    method: "Fornell–Larcker (AVE vs squared inter-construct correlations) AND HTMT matrix."
    criteria:
      - name: fornell_larcker
        rule: "Each construct's AVE exceeds its squared correlations with all other constructs"
        citation_keys: [fornell_larcker1981]
      - name: htmt_ceiling
        rule: "HTMT < 0.85; 0.85–0.90 flagged for conceptually adjacent pairs; > 0.90 fails"
        value: 0.85
        on_borderline: "0.85–0.90 flagged with conceptual-adjacency justification required"
        citation_keys: [henseler2015]
    outputs: ["measurement.discriminant"]
    failure_action: recommend
    citations: [fornell_larcker1981, henseler2015]

  - id: PB-12
    stage: measurement
    title: "Common method bias assessment"
    purpose: "Assess method variance with a screen plus a substantive test."
    method: "Harman's single-factor as screen; common latent factor / marker variable technique as the substantive test; procedural remedies documented."
    criteria:
      - name: harman_screen
        rule: "No single factor explains > 50% of variance (screen only)"
        value: 0.50
        citation_keys: [podsakoff2003]
      - name: clf_substantive
        rule: "CLF/marker comparison shows no substantial method variance distorting loadings/paths"
        citation_keys: [podsakoff2003, williams2010]
    outputs: ["measurement.cmb"]
    failure_action: flag
    citations: [podsakoff2003, williams2010]

  - id: PB-13
    stage: measurement
    title: "Item deletion protocol (protected by default)"
    purpose: "Govern the p-hacking trapdoor at the highest level."
    method: >
      Deletion candidates surface as recommendations unless pre-authorized in
      policy (FR-705). Where pre-authorized: one item at a time with FULL
      re-estimation after each; dual trigger required (statistical signal AND
      content-validity check that the construct's domain remains intact); hard
      floor of three items per reflective construct — constructs designed with
      fewer than three items are deletion-locked; validated-instrument
      deviations prominently flagged; complete before/after audit.
    criteria:
      - name: protected_default
        rule: "No autonomous deletion without explicit policy pre-authorization"
        policy_ref: measurement.item_deletion.preauthorized
        citation_keys: [mackenzie2011]
      - name: dual_trigger
        rule: "Statistical signal AND content-validity check both required"
        citation_keys: [mackenzie2011, hair2019]
      - name: three_item_floor
        rule: "Never below 3 items per reflective construct; < 3 designed = deletion-locked"
        value: 3
        citation_keys: [kline2016]
    governance:
      protected_default: true
      preauthorization_policy_ref: measurement.item_deletion.preauthorized
    outputs: ["measurement.item_deletion"]
    failure_action: recommend
    citations: [mackenzie2011, hair2019, kline2016]

  - id: PB-14
    stage: measurement
    title: "Respecification rule"
    purpose: "Bound model adjustment to theory-consistent, auditable moves."
    method: >
      Modification indices consulted for WITHIN-construct error covariances
      only; MI >= 3.84 significance floor; applied cumulatively one at a time
      with re-estimation; total count capped by policy; each modification
      logged with MI, expected parameter change, and justification.
    criteria:
      - name: within_construct_only
        rule: "Cross-construct error covariances and error-to-latent covariances are impermissible"
        citation_keys: [hermida2015, byrne2016]
      - name: mi_floor
        rule: "MI >= 3.84 (chi-square, 1 df, p = .05)"
        value: 3.84
        citation_keys: [byrne2016]
      - name: hard_cap
        rule: "Cumulative modifications <= policy cap"
        policy_ref: measurement.respecification.max_modifications
        citation_keys: [hermida2015]
    outputs: ["measurement.respecification"]
    failure_action: flag
    citations: [hermida2015, byrne2016]

  - id: PB-15
    stage: structural
    title: "Global fit evaluation"
    purpose: "Judge model fit against the adopted band — reported and interpreted, never auto-'fixed'."
    method: "Chi-square with df and p; normed chi-square; CFI; TLI; RMSEA with 90% CI; SRMR. Baseline and adjusted models reported side by side when PB-14 applied."
    criteria:
      - name: normed_chisq
        rule: "chi-square/df < 3.0"
        value: 3.0
        citation_keys: [kline2016]
      - name: cfi_floor
        rule: "CFI > 0.90 acceptable; >= 0.95 good"
        value: 0.90
        citation_keys: [hu_bentler1999, hair2019]
      - name: tli_floor
        rule: "TLI > 0.90"
        value: 0.90
        citation_keys: [hu_bentler1999]
      - name: rmsea_ceiling
        rule: "RMSEA < 0.08 acceptable (report 90% CI); <= 0.06 good"
        value: 0.08
        citation_keys: [maccallum1996, hu_bentler1999]
      - name: srmr_ceiling
        rule: "SRMR < 0.08"
        value: 0.08
        citation_keys: [hu_bentler1999]
    outputs: ["structural.fit"]
    failure_action: report
    citations: [kline2016, hu_bentler1999, hair2019, maccallum1996]

  - id: PB-16
    stage: structural
    title: "Structural paths and explained variance"
    purpose: "Estimate hypothesized relationships with uncertainty honestly stated."
    method: "Standardized and unstandardized paths with bootstrapped CIs; R-squared per endogenous construct; higher-order carry per contract (full hierarchy or latent scores) recorded with rationale (FR-803)."
    criteria:
      - name: significance_rule
        rule: "Hypothesis support requires p < .05 (or CI excluding zero); marginal (.05–.10) reported as not supported"
        value: 0.05
        citation_keys: [jars2018]
    outputs: ["structural.path", "structural.r_squared"]
    failure_action: report
    citations: [jars2018, kline2016]

  - id: PB-17
    stage: effects
    title: "Mediation and moderation decomposition"
    purpose: "Decompose effects with resampling-based inference and formal classification."
    method: >
      Bias-corrected bootstrap CIs (resamples per policy; default 5000) for
      direct, indirect, and total effects; per-path indirect decomposition for
      multi-mediator chains; classification per the Zhao–Lynch–Chen typology
      (complementary, competitive, indirect-only, direct-only, no-effect).
    criteria:
      - name: resamples
        rule: "Bootstrap resamples per policy (default 5000), bias-corrected CIs"
        policy_ref: effects.bootstrap.resamples
        citation_keys: [preacher_hayes2008]
      - name: classification
        rule: "Every hypothesized indirect effect classified per typology"
        citation_keys: [zhao2010]
    outputs: ["effects.direct", "effects.indirect", "effects.total", "effects.classification"]
    failure_action: report
    citations: [preacher_hayes2008, zhao2010]

  - id: PB-18
    stage: robustness
    title: "Alternative model comparison"
    purpose: "Show the retained model is preferable to plausible rivals, not merely adequate."
    method: "At least one theoretically motivated alternative structure compared on fit and information criteria; baseline-vs-adjusted comparison when respecified."
    criteria:
      - name: alternative_required
        rule: ">= 1 alternative model estimated and compared"
        value: 1
        citation_keys: [vandenberg_grelle2009]
    outputs: ["robustness.alternatives"]
    failure_action: flag
    citations: [vandenberg_grelle2009, kline2016]

  - id: PB-19
    stage: robustness
    title: "Achieved power"
    purpose: "Close the loop opened at PB-01 with the final analytical sample."
    method: "Achieved power for the close-fit test and focal paths at final N."
    criteria:
      - name: achieved_power_report
        rule: "Achieved power computed and reported; < 0.80 prominently flagged"
        value: 0.80
        citation_keys: [maccallum1996]
    outputs: ["robustness.achieved_power"]
    failure_action: flag
    citations: [maccallum1996]

  - id: PB-20
    stage: narrate
    title: "Findings chapter structure"
    purpose: "Draft the findings in the canonical order with locked numbers."
    method: "Node B drafts per /reporting/chapter_structure using statistic references only; renderer injects values; checker enforces resolution and claim consistency (FR-1003)."
    criteria:
      - name: structure_conformance
        rule: "Draft sections match chapter_structure order and coverage; all hypotheses reported including unsupported"
        citation_keys: [jars2018]
    outputs: []
    failure_action: halt
    citations: [jars2018]

  - id: PB-21
    stage: package
    title: "Reporting set"
    purpose: "Emit the full APA/JARS table set and governance documents."
    method: "Generate /reporting/table_set plus figures, SPSS/AMOS validation pack, compliance checklist, disclosure, and supervisor pack (FR-1104–1108)."
    criteria:
      - name: table_set_complete
        rule: "Every /reporting/table_set entry produced or explicitly marked not-applicable with reason"
        citation_keys: [jars2018]
    outputs: []
    failure_action: halt
    citations: [jars2018]

citations:
  anderson_gerbing1988: "Anderson, J. C., & Gerbing, D. W. (1988). Structural equation modeling in practice: A review and recommended two-step approach. Psychological Bulletin, 103(3), 411–423."
  bentler_chou1987: "Bentler, P. M., & Chou, C.-P. (1987). Practical issues in structural modeling. Sociological Methods & Research, 16(1), 78–117."
  byrne2016: "Byrne, B. M. (2016). Structural equation modeling with AMOS: Basic concepts, applications, and programming (3rd ed.). Routledge."
  cohen1988: "Cohen, J. (1988). Statistical power analysis for the behavioral sciences (2nd ed.). Routledge."
  credé_harms2015: "Credé, M., & Harms, P. D. (2015). 25 years of higher-order confirmatory factor analysis in the organizational sciences. Journal of Organizational Behavior, 36(6), 845–872."
  curran1996: "Curran, P. J., West, S. G., & Finch, J. F. (1996). The robustness of test statistics to nonnormality and specification error in confirmatory factor analysis. Psychological Methods, 1(1), 16–29."
  enders2010: "Enders, C. K. (2010). Applied missing data analysis. Guilford Press."
  finney2013: "Finney, S. J., & DiStefano, C. (2013). Nonnormal and categorical data in structural equation modeling. In Structural equation modeling: A second course (2nd ed.). IAP."
  fornell_larcker1981: "Fornell, C., & Larcker, D. F. (1981). Evaluating structural equation models with unobservable variables and measurement error. Journal of Marketing Research, 18(1), 39–50."
  hair2019: "Hair, J. F., Black, W. C., Babin, B. J., & Anderson, R. E. (2019). Multivariate data analysis (8th ed.). Cengage."
  henseler2015: "Henseler, J., Ringle, C. M., & Sarstedt, M. (2015). A new criterion for assessing discriminant validity in variance-based structural equation modeling. Journal of the Academy of Marketing Science, 43(1), 115–135."
  hermida2015: "Hermida, R. (2015). The problem of allowing correlated errors in structural equation modeling: Concerns and considerations. Computational Methods in Social Sciences, 3(1), 5–17."
  hu_bentler1999: "Hu, L., & Bentler, P. M. (1999). Cutoff criteria for fit indexes in covariance structure analysis: Conventional criteria versus new alternatives. Structural Equation Modeling, 6(1), 1–55."
  jars2018: "Appelbaum, M., Cooper, H., Kline, R. B., Mayo-Wilson, E., Nezu, A. M., & Rao, S. M. (2018). Journal article reporting standards for quantitative research in psychology: The APA Publications and Communications Board task force report. American Psychologist, 73(1), 3–25."
  kline2016: "Kline, R. B. (2016). Principles and practice of structural equation modeling (4th ed.). Guilford Press."
  little1988: "Little, R. J. A. (1988). A test of missing completely at random for multivariate data with missing values. Journal of the American Statistical Association, 83(404), 1198–1202."
  maccallum1996: "MacCallum, R. C., Browne, M. W., & Sugawara, H. M. (1996). Power analysis and determination of sample size for covariance structure modeling. Psychological Methods, 1(2), 130–149."
  mackenzie2011: "MacKenzie, S. B., Podsakoff, P. M., & Podsakoff, N. P. (2011). Construct measurement and validation procedures in MIS and behavioral research. MIS Quarterly, 35(2), 293–334."
  mardia1970: "Mardia, K. V. (1970). Measures of multivariate skewness and kurtosis with applications. Biometrika, 57(3), 519–530."
  muthen2002: "Muthén, L. K., & Muthén, B. O. (2002). How to use a Monte Carlo study to decide on sample size and determine power. Structural Equation Modeling, 9(4), 599–620."
  newman2014: "Newman, D. A. (2014). Missing data: Five practical guidelines. Organizational Research Methods, 17(4), 372–411."
  nunnally1994: "Nunnally, J. C., & Bernstein, I. H. (1994). Psychometric theory (3rd ed.). McGraw-Hill."
  podsakoff2003: "Podsakoff, P. M., MacKenzie, S. B., Lee, J.-Y., & Podsakoff, N. P. (2003). Common method biases in behavioral research: A critical review of the literature and recommended remedies. Journal of Applied Psychology, 88(5), 879–903."
  preacher_hayes2008: "Preacher, K. J., & Hayes, A. F. (2008). Asymptotic and resampling strategies for assessing and comparing indirect effects in multiple mediator models. Behavior Research Methods, 40(3), 879–891."
  rhemtulla2012: "Rhemtulla, M., Brosseau-Liard, P. É., & Savalei, V. (2012). When can categorical variables be treated as continuous? Psychological Methods, 17(3), 354–373."
  rubin1987: "Rubin, D. B. (1987). Multiple imputation for nonresponse in surveys. Wiley."
  satorra_bentler2001: "Satorra, A., & Bentler, P. M. (2001). A scaled difference chi-square test statistic for moment structure analysis. Psychometrika, 66(4), 507–514."
  tabachnick2019: "Tabachnick, B. G., & Fidell, L. S. (2019). Using multivariate statistics (7th ed.). Pearson."
