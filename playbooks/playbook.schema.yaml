# Burhān — playbook schema (docs/06_playbooks/playbook.schema.yaml)
# JSON Schema draft 2020-12, expressed in YAML. Validates every playbook file
# at load (FR-1301). Conventions and the playbook↔policy split are documented
# in PLAYBOOK_SCHEMA.md.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "burhan:schemas/playbook/v1"
title: Playbook
type: object
additionalProperties: false
required: [schema_version, meta, reporting, steps, citations]
properties:
  schema_version: { const: 1 }

  meta:
    type: object
    additionalProperties: false
    required: [id, version, methodology, adopted_by, status]
    properties:
      id:          { type: string, pattern: "^[A-Z0-9_]+$" }        # CB_SEM_PLAYBOOK
      version:     { type: string, pattern: "^[0-9]+\\.[0-9]+$" }   # "1.0"
      methodology: { enum: [CB_SEM] }        # widens per phase (FR-1304)
      adopted_by:  { type: string }          # method owner statement (Concept §4)
      status:      { enum: [draft, approved] }
      approval_note: { type: string }
      changelog:   { type: array, items: { type: string } }

  reporting:
    type: object
    additionalProperties: false
    required: [standards, chapter_structure]
    properties:
      standards: { type: array, minItems: 1, items: { type: string } }   # APA 7, JARS-Quant
      chapter_structure:                       # canonical findings order (§4.4, FR-1004)
        type: array
        minItems: 3
        items: { type: string }
      table_set: { type: array, items: { type: string } }

  steps:
    type: array
    minItems: 5
    items:
      type: object
      additionalProperties: false
      required: [id, stage, title, purpose, method, failure_action, citations]
      properties:
        id:    { type: string, pattern: "^PB-[0-9]{2}$" }
        stage: { enum: [power, prep, assumptions, measurement, structural, effects, robustness, narrate, package] }
        title: { type: string }
        purpose: { type: string }
        method:  { type: string }             # the procedure, stated operationally
        criteria:                              # evaluable rules (thresholds live HERE)
          type: array
          items:
            type: object
            additionalProperties: false
            required: [name, rule]
            properties:
              name: { type: string }
              rule: { type: string }           # human-readable evaluable rule
              value: { type: [number, string, "null"] }
              policy_ref: { type: string }     # decision_policy key when the NUMBER is operational
              citation_keys: { type: array, items: { type: string } }
              on_borderline: { type: string }  # explicit borderline handling, if any
        governance:                            # protected-decision linkage (FR-705/1202)
          type: object
          additionalProperties: false
          properties:
            protected_default: { type: boolean }
            preauthorization_policy_ref: { type: string }
        outputs:                               # results-store ID prefixes this step must emit
          type: array
          items: { type: string }
        failure_action: { enum: [halt, flag, advisory, recommend, report] }
        citations: { type: array, minItems: 1, items: { type: string } }  # keys into /citations

  citations:
    type: object
    minProperties: 1
    additionalProperties: { type: string }     # key -> full reference string

# Loader cross-checks beyond JSON Schema (hard failures, FR-1301/1302):
#   P1  step ids unique and ordered; stages appear in pipeline order
#   P2  every citations key used in any step exists in /citations
#   P3  every policy_ref resolves against decision_policy.yaml at run start
#   P4  every outputs prefix conforms to the statistic-ID grammar (05_schemas)
#   P5  meta.status == approved required for production runs
